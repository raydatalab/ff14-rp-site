    {index:18,emoji:"👯",name:"那姆阿卡肥",image:"images/cards/card_17.webp",gameid:"那姆阿卡@银泪湖",clue:"FF14扑克牌大师，肥BOX老大，致力于正和RP环境"},
    {index:19,emoji:"🧹",name:"恰里肥",image:"images/cards/card_18.webp",gameid:"恰里里@红茶川",clue:"饿了潜入食材店被抓，每天都在努力旷工看不见就是旷了"},
    {index:20,emoji:"🍳",name:"天地肥",image:"images/cards/card_19.webp",gameid:"天地为栏@红茶川",clue:"吃了太多巨人新薯的塔塔露，不定时刷新有礼物"},
    {index:21,emoji:"🛁",name:"威士忌肥",image:"images/cards/card_20.webp",gameid:"冰封威士忌@银泪湖",clue:"围观巡游时被抓入店，从私家肥厨转行搓澡师傅"},
    {index:22,emoji:"🐼",name:"熊依肥",image:"images/cards/card_21.webp",gameid:"熊依@红茶川",clue:"偷吃肥肥一周后被招募，监守自盗的保安"},
    {index:23,emoji:"🐤",name:"严肃肥",image:"images/cards/card_22.webp",gameid:"严严肃·严肃@红茶川",clue:"晃晃悠悠的碎觉肥，跳起来攻击膝盖效果拔群"},
    {index:24,emoji:"🦈",name:"无星肥",image:"images/cards/card_23.webp",gameid:"夜里无星@银泪湖",clue:"笨笨的傻傻的，公肥母肥常被认错，偷偷吸遍店里公肥"},
    {index:25,emoji:"👶",name:"小白肥",image:"images/cards/card_24.webp",gameid:"伊小白@银泪湖",clue:"被无良导师骗进店抵债两亿，只刷新在淦肥周围"},
    {index:26,emoji:"🎨",name:"宜心香肥",image:"images/cards/card_25.webp",gameid:"宜心香@银泪湖",clue:"神秘刷新的社恐小肥，总是抱着板子在画画"},
    {index:27,emoji:"🐷",name:"波奇肥",image:"images/cards/card_26.webp",gameid:"嘤嘤嘤@红茶川",clue:"吃太多被小瓜变成波奇保安，监守自盗吃肥"},
    {index:28,emoji:"🔮",name:"长安肥",image:"images/cards/card_27.webp",gameid:"长安月@水晶塔",clue:"抱着水晶球的占卜师Tifa肥，摸头会冒花花库啵"},
    {index:29,emoji:"🍊",name:"橘子肥",image:"images/cards/card_28.webp",gameid:"橘子睡大觉@红茶川",clue:"爱睡觉的橘子，在艾欧泽亚路边可捡到睡眠中的"},
    {index:30,emoji:"🍉",name:"小瓜肥",image:"images/cards/card_29.webp",gameid:"我不是小瓜@红茶川",clue:"肥肥之家创始店长，拐骗收留了各种口味的肥肥"},
    {index:31,emoji:"🎲",name:"斯卡肥",image:"images/cards/card_30.webp",gameid:"斯卡@红茶川",clue:"赌绿图破产来打工，赚到钱继续去赌"},
    {index:32,emoji:"🎮",name:"40肥",image:"images/cards/card_31.webp",gameid:"似零@红茶川",clue:"来一个多月什么也不会，自认是吉祥物不想上班"},
    {index:33,emoji:"🎩",name:"梦糖肥",image:"images/cards/card_32.webp",gameid:"幼狐@伊修加德",clue:"丢了房子卖身打工的可怜肥肥，狂热兔男控"},
    {index:34,emoji:"🌼",name:"卡特肥",image:"images/cards/card_33.webp",gameid:"牧牧狐·牧狐@红茶川",clue:"涤罪之心无限循环，滋一下滋一下滋一下"},
    {index:35,emoji:"❄️",name:"啊噗噜肥",image:"images/cards/card_34.webp",gameid:"啊噗噜派派派@水晶塔",clue:"异乡白毛肥肥，被炉火骗进来，怎么叫也叫不醒"},
    {index:36,emoji:"👯",name:"莉莉肥",image:"images/cards/card_35.webp",gameid:"莉莉西雅@伊修加德",clue:"追寻失踪姐姐来到沙都，发现笨P在打工于是留下"},
    {index:37,emoji:"🌶️",name:"花椒肥",image:"images/cards/card_36.webp",gameid:"一棵花椒@银泪湖",clue:"从隔壁食材黑化成吃肥能手，精通喂洗切烤一条龙"},
    {index:38,emoji:"☃️",name:"雪人肥",image:"images/cards/card_37.webp",gameid:"一般路过魔女@红玉海",clue:"高维宇宙来的雪人拟态，b站FF区直播五年"},
    {index:39,emoji:"🤔",name:"小个头肥",image:"images/cards/card_38.webp",gameid:"小个头大智慧@太阳海岸",clue:"满脑子诡计会发出渗人笑声，胃口很大的肥肥"},
    {index:40,emoji:"🐰",name:"矮兔肥",image:"images/cards/card_39.webp",gameid:"小矮兔@银泪湖",clue:"FF14宠物矮兔成精，开箱副本掉落获得，等级会升降"}
  
  ];

  var TOTAL = staffData.length;

  var state = {
    remaining: [],
    score: 0,
    combo: 0,
    maxCombo: 0,
    answered: false,
    currentStaff: null,
    optionStaff: []
  };

  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function updateStats() {
    document.getElementById('gameScore').textContent = state.score;
    document.getElementById('gameCombo').textContent = state.combo;
    document.getElementById('gameMaxCombo').textContent = state.maxCombo;
    var done = TOTAL - state.remaining.length;
    document.getElementById('gameProgress').textContent = '第 ' + done + '/' + TOTAL + ' 题';
  }

  function handleAnswer(selectedIdx, btnIdx) {
    if (state.answered) return;
    state.answered = true;

    var correct = state.currentStaff;
    var optionStaff = state.optionStaff;
    var btns = document.querySelectorAll('.game-option');

    // Highlight correct answer (green)
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (optionStaff[i].index === correct.index) {
        btns[i].classList.add('correct');
      }
    }

    // Highlight wrong selection (red)
    if (optionStaff[selectedIdx].index !== correct.index) {
      btns[btnIdx].classList.add('wrong');
    }

    var feedback = document.getElementById('gameFeedback');
    if (optionStaff[selectedIdx].index === correct.index) {
      state.score++;
      state.combo++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      feedback.innerHTML = '✅ 答对了！是 ' + correct.emoji + correct.name + '！';
      feedback.className = 'game-feedback game-feedback-correct';

      if (state.combo === 3) {
        showComboCelebration();
      }
    } else {
      state.combo = 0;
      feedback.innerHTML = '❌ 再想想，正确答案是 ' + correct.emoji + correct.name + '。';
      feedback.className = 'game-feedback game-feedback-wrong';
    }

    feedback.style.display = 'block';
    updateStats();
    document.getElementById('gameNextBtn').style.display = 'inline-block';
  }

  function showComboCelebration() {
    document.getElementById('comboModal').classList.add('active');
  }

  function hideComboCelebration() {
    document.getElementById('comboModal').classList.remove('active');
  }

  function nextQuestion() {
    if (state.remaining.length === 0) {
      gameComplete();
      return;
    }

    state.answered = false;

    // Pick random target from remaining
    var idx = Math.floor(Math.random() * state.remaining.length);
    var targetIdx = state.remaining[idx];
    state.remaining.splice(idx, 1);
    state.currentStaff = staffData[targetIdx - 1];

    // Build 4 options: 1 correct + 3 random wrong
    var wrongPool = staffData.filter(function(s) { return s.index !== targetIdx; });
    shuffle(wrongPool);
    var options = [state.currentStaff, wrongPool[0], wrongPool[1], wrongPool[2]];
    shuffle(options);
    state.optionStaff = options;

    // Show clue
    document.getElementById('gameDesc').textContent = state.currentStaff.clue;

    // Render options
    var btns = document.querySelectorAll('.game-option');
    for (var i = 0; i < btns.length; i++) {
      btns[i].textContent = options[i].emoji + ' ' + options[i].name;
      btns[i].className = 'game-option';
      btns[i].disabled = false;
      btns[i].onclick = (function(si, bi) {
        return function() { handleAnswer(si, bi); };
      })(i, i);
    }

    document.getElementById('gameFeedback').style.display = 'none';
    document.getElementById('gameNextBtn').style.display = 'none';
    document.getElementById('gameNextBtn').textContent = '下一题 →';
    document.getElementById('gameOptions').style.display = 'grid';

    updateStats();
  }

  function gameComplete() {
    document.getElementById('gameDesc').textContent = '🎉 全部答完！点击下方按钮重新开始 🎉';
    document.getElementById('gameOptions').style.display = 'none';

    var feedback = document.getElementById('gameFeedback');
    feedback.innerHTML = '🎊 恭喜你完成了所有题目！<br>得分：' + state.score + ' / ' + TOTAL + '，最高连击：' + state.maxCombo + ' 🎊' +
      '<br><br>📜 据不愿透露姓名的乌尔达哈荣誉市民透露：<br>' +
      '“你是瓜店长，娜娜莫之后又一名到达这里的勇士。<br>' +
      '肥肥之家的炉火，将永远为你而燃。” ✨🔥';
    feedback.style.display = 'block';
    feedback.className = 'game-feedback';

    var nextBtn = document.getElementById('gameNextBtn');
    nextBtn.textContent = '🔄 再来一次';
    nextBtn.style.display = 'inline-block';
    nextBtn.onclick = resetGame;
  }

  function resetGame() {
    state.remaining = [];
    for (var i = 1; i <= TOTAL; i++) state.remaining.push(i);
    state.score = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.answered = false;
    document.getElementById('gameNextBtn').onclick = nextQuestion;
    updateStats();
    nextQuestion();
  }

  // Wire combo modal
  document.getElementById('comboContinueBtn').addEventListener('click', hideComboCelebration);
  document.getElementById('comboOverlay').addEventListener('click', hideComboCelebration);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideComboCelebration();
  });

  // Start the game!
  resetGame();
})();
</script>
</body>
</html>

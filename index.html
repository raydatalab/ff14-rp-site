<script>
// Lightweight typewriter for homepage title
(function(){
  var el = document.querySelector('.typewriter-text');
  if(!el) return;
  var text = el.textContent;
  el.textContent = '';
  el.style.width = '0';
  el.style.display = 'inline-block';
  el.style.overflow = 'hidden';
  el.style.whiteSpace = 'nowrap';
  el.style.borderRight = '2px solid #d4af37';
  el.style.animation = 'typewriter 1.8s steps(' + text.length + ') 0.5s forwards, blink-caret 0.8s step-end 6';
  el.style.width = '0';
  // Set final width via keyframe
  var style = document.createElement('style');
  style.textContent = '@keyframes typewriter { from { width: 0; } to { width: ' + (text.length * 1.1) + 'ch; } }';
  document.head.appendChild(style);
  // Actually set the text after animation starts
  setTimeout(function() {
    el.textContent = text;
  }, 100);
})();
</script>
